openapi: 3.0.3
info:
  title: Billing API
  description: Subscription billing, invoicing, and payment processing for Acme Corp
  version: 2.7.0
  contact:
    name: Payments Team
    email: payments@acme.com
  x-domain: billing
  x-tier: critical
servers:
  - url: https://billing.api.example.com/v1
    description: Production
  - url: https://billing-dev.api.example.com/v1
    description: Development
tags:
  - name: subscriptions
  - name: invoices
  - name: payments
  - name: plans
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [subscriptions]
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  version: { type: string }
  /subscriptions:
    get:
      summary: List subscriptions
      operationId: listSubscriptions
      tags: [subscriptions]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, cancelled, past_due, trialing]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        '200':
          description: Subscriptions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items: { $ref: '#/components/schemas/Subscription' }
                  total: { type: integer }
    post:
      summary: Create subscription
      operationId: createSubscription
      tags: [subscriptions]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id, customer_id, payment_method_id]
              properties:
                plan_id: { type: string }
                customer_id: { type: string, format: uuid }
                payment_method_id: { type: string }
                trial_days: { type: integer, default: 0 }
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
  /subscriptions/{subscriptionId}:
    get:
      summary: Get subscription
      operationId: getSubscription
      tags: [subscriptions]
      security:
        - BearerAuth: []
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
    delete:
      summary: Cancel subscription
      operationId: cancelSubscription
      tags: [subscriptions]
      security:
        - BearerAuth: []
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cancel_at_period_end: { type: boolean, default: true }
                reason: { type: string }
      responses:
        '200':
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
  /invoices:
    get:
      summary: List invoices
      operationId: listInvoices
      tags: [invoices]
      security:
        - BearerAuth: []
      parameters:
        - name: customer_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, open, paid, void, uncollectible]
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items: { $ref: '#/components/schemas/Invoice' }
  /invoices/{invoiceId}:
    get:
      summary: Get invoice
      operationId: getInvoice
      tags: [invoices]
      security:
        - BearerAuth: []
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
  /invoices/{invoiceId}/pay:
    post:
      summary: Pay invoice
      operationId: payInvoice
      tags: [payments]
      security:
        - BearerAuth: []
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
  /plans:
    get:
      summary: List plans
      operationId: listPlans
      tags: [plans]
      responses:
        '200':
          description: Available plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items: { $ref: '#/components/schemas/Plan' }
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Subscription:
      type: object
      properties:
        id: { type: string }
        customer_id: { type: string, format: uuid }
        plan_id: { type: string }
        status:
          type: string
          enum: [active, cancelled, past_due, trialing]
        current_period_start: { type: string, format: date-time }
        current_period_end: { type: string, format: date-time }
        cancel_at_period_end: { type: boolean }
        amount: { type: number }
        currency: { type: string, example: usd }
        created_at: { type: string, format: date-time }
    Invoice:
      type: object
      properties:
        id: { type: string }
        customer_id: { type: string, format: uuid }
        subscription_id: { type: string }
        status:
          type: string
          enum: [draft, open, paid, void, uncollectible]
        amount_due: { type: number }
        amount_paid: { type: number }
        currency: { type: string }
        due_date: { type: string, format: date }
        paid_at: { type: string, format: date-time }
        line_items:
          type: array
          items:
            type: object
            properties:
              description: { type: string }
              amount: { type: number }
    Plan:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: number }
        currency: { type: string }
        interval:
          type: string
          enum: [month, year]
        features: { type: array, items: { type: string } }
