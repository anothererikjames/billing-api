openapi: 3.1.0
info:
  title: Billing API
  version: "2.1.0"
  description: Subscription management, invoicing, and payment processing for the Acme platform.
  contact:
    name: Billing Team
    email: billing-team@acme.io
    url: https://wiki.acme.io/teams/billing

servers:
  - url: https://api.acme.io/billing/v2
    description: Production
  - url: https://dev-api.acme.io/billing/v2
    description: Development

security:
  - bearerAuth: []

tags:
  - name: subscriptions
    description: Subscription lifecycle management
  - name: invoices
    description: Invoice retrieval and management
  - name: payments
    description: Payment processing

paths:
  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List all subscriptions for the authenticated account
      tags: [subscriptions]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, cancelled, past_due, trialing]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionList"
    post:
      operationId: createSubscription
      summary: Create a new subscription
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreate"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "402":
          description: Payment required — card declined

  /subscriptions/{subscriptionId}:
    get:
      operationId: getSubscription
      summary: Retrieve a subscription by ID
      tags: [subscriptions]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          description: Subscription not found

  /subscriptions/{subscriptionId}/cancel:
    put:
      operationId: cancelSubscription
      summary: Cancel a subscription (immediate or at period end)
      tags: [subscriptions]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                immediately:
                  type: boolean
                  default: false
                reason:
                  type: string
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /invoices:
    get:
      operationId: listInvoices
      summary: List invoices for the authenticated account
      tags: [invoices]
      parameters:
        - name: subscriptionId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, open, paid, void, uncollectible]
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceList"

  /invoices/{invoiceId}:
    get:
      operationId: getInvoice
      summary: Retrieve an invoice by ID
      tags: [invoices]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /payments/process:
    post:
      operationId: processPayment
      summary: Manually trigger payment processing for an open invoice
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceId]
              properties:
                invoiceId:
                  type: string
                paymentMethodId:
                  type: string
      responses:
        "200":
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"
        "402":
          description: Payment failed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Subscription:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        planId:
          type: string
        status:
          type: string
          enum: [active, cancelled, past_due, trialing]
        currentPeriodStart:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
        cancelAtPeriodEnd:
          type: boolean
        createdAt:
          type: string
          format: date-time

    SubscriptionCreate:
      type: object
      required: [planId, paymentMethodId]
      properties:
        planId:
          type: string
          example: plan_pro_monthly
        paymentMethodId:
          type: string
        trialDays:
          type: integer
          minimum: 0
          maximum: 30

    SubscriptionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        nextCursor:
          type: string
        total:
          type: integer

    Invoice:
      type: object
      properties:
        id:
          type: string
        subscriptionId:
          type: string
        status:
          type: string
          enum: [draft, open, paid, void, uncollectible]
        amountDue:
          type: integer
          description: Amount in cents
        amountPaid:
          type: integer
        currency:
          type: string
          example: usd
        dueDate:
          type: string
          format: date
        pdfUrl:
          type: string
          format: uri

    InvoiceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        total:
          type: integer

    PaymentResult:
      type: object
      properties:
        invoiceId:
          type: string
        status:
          type: string
          enum: [succeeded, failed, pending]
        chargeId:
          type: string
        processedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
